<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streak">
<meta name="theme-color" content="#0f0f12">
<title>Streak — Habit Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f12;
    --surface: #1a1a20;
    --surface2: #22222a;
    --border: #2e2e38;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --positive: #4ade80;
    --positive-dim: rgba(74,222,128,0.12);
    --negative: #f87171;
    --negative-dim: rgba(248,113,113,0.12);
    --accent: #a78bfa;
    --accent-dim: rgba(167,139,250,0.15);
    --gold: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.5;
    min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom);
    overscroll-behavior: none;
  }

  .app { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }

  header {
    padding: 24px 0 16px; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
  }
  .wordmark { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
  .wordmark span { color: var(--accent); }
  .date-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

  .score-block { text-align: right; }
  .score-ring-wrap { position: relative; width: 64px; height: 64px; margin-left: auto; }
  .score-ring-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .score-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; }
  .score-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

  .streak-row { display: flex; gap: 8px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; }
  .streak-icon { font-size: 22px; }
  .streak-text strong { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--gold); }
  .streak-text p { font-size: 13px; color: var(--muted); }
  .reset-day-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin: 24px 0 10px; }
  .section-title { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .add-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 18px; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .add-btn:active { background: var(--surface2); }

  .habit-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; -webkit-tap-highlight-color: transparent; user-select: none; }
  .habit-card.positive { border-left: 3px solid var(--positive); }
  .habit-card.negative { border-left: 3px solid var(--negative); }
  .habit-icon { font-size: 24px; width: 36px; text-align: center; flex-shrink: 0; }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .habit-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }

  .habit-counter { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .counter-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 300; line-height: 1; transition: all 0.12s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; color: var(--muted); }
  .counter-btn.plus { border-color: var(--positive); color: var(--positive); }
  .counter-btn.plus:active { background: var(--positive-dim); transform: scale(0.9); }
  .counter-btn.minus { border-color: var(--negative); color: var(--negative); }
  .counter-btn.minus:active { background: var(--negative-dim); transform: scale(0.9); }
  .counter-btn:disabled { opacity: 0.25; pointer-events: none; }
  .counter-val { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; min-width: 22px; text-align: center; line-height: 1; }
  .counter-val.pos { color: var(--positive); }
  .counter-val.neg { color: var(--negative); }
  .counter-val.zero { color: var(--muted); font-size: 16px; }

  .empty { text-align: center; padding: 24px 16px; color: var(--muted); font-size: 13px; border: 1px dashed var(--border); border-radius: 14px; margin-bottom: 8px; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,15,18,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); justify-content: space-around; z-index: 100; }
  .nav-btn { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 20px; border-radius: 10px; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .icon { font-size: 22px; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-value.green { color: var(--positive); }
  .stat-value.purple { color: var(--accent); }
  .stat-value.gold { color: var(--gold); }
  .stat-name { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .history-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .history-row:last-child { border-bottom: none; }
  .history-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 72px; flex-shrink: 0; }
  .history-bar-wrap { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .history-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .history-score { font-family: 'DM Mono', monospace; font-size: 12px; width: 36px; text-align: right; flex-shrink: 0; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; border: 1px solid var(--border); border-bottom: none; max-height: 92dvh; overflow-y: auto; }
  .modal h2 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; margin-bottom: 20px; }

  .field { margin-bottom: 16px; }
  .field label { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); display: block; margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  .type-toggle { display: flex; gap: 8px; }
  .type-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .type-btn.pos.selected { background: var(--positive-dim); border-color: var(--positive); color: var(--positive); }
  .type-btn.neg.selected { background: var(--negative-dim); border-color: var(--negative); color: var(--negative); }

  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; background: var(--surface2); border-radius: 10px; padding: 8px; border: 1px solid var(--border); }
  .emoji-opt { font-size: 22px; text-align: center; padding: 4px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
  .emoji-opt:active, .emoji-opt.selected { background: var(--accent-dim); }

  /* Reminder section inside modal */
  .reminder-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  .reminder-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; }
  .reminder-section-title { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .reminder-toggle { width: 44px; height: 26px; background: var(--border); border-radius: 13px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: none; }
  .reminder-toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
  .reminder-toggle.on { background: var(--accent); }
  .reminder-toggle.on::after { transform: translateX(18px); }
  .reminder-options { margin-top: 14px; display: none; }
  .reminder-options.visible { display: block; }
  .reminder-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .reminder-row .field { flex: 1; margin-bottom: 0; }
  .hourly-row { display: none; gap: 8px; }
  .hourly-row.visible { display: flex; }
  .hourly-row .field { flex: 1; margin-bottom: 0; }
  .notif-hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.4; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary { flex: 1; background: var(--accent); color: #0f0f12; border: none; border-radius: 12px; padding: 14px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-family: 'Inter', sans-serif; font-size: 15px; cursor: pointer; }
  .btn-danger { background: var(--negative-dim); color: var(--negative); border: 1px solid rgba(248,113,113,0.3); border-radius: 12px; padding: 14px 20px; font-family: 'Inter', sans-serif; font-size: 15px; cursor: pointer; }

  .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; font-size: 14px; font-weight: 500; z-index: 300; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; max-width: calc(100vw - 32px); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .notif-banner { background: var(--accent-dim); border: 1px solid rgba(167,139,250,0.3); border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 10px; align-items: center; }
  .notif-banner p { font-size: 13px; color: var(--text); flex: 1; }
  .notif-banner button { background: var(--accent); color: #0f0f12; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  select option { background: #1a1a20; }
</style>
</head>
<body>

<div class="app">

  <!-- TODAY -->
  <div class="panel active" id="panel-today">
    <header>
      <div>
        <div class="wordmark">streak<span>.</span></div>
        <div class="date-label" id="today-date"></div>
      </div>
      <div class="score-block">
        <div class="score-ring-wrap">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" stroke="#2e2e38" stroke-width="5" fill="none"/>
            <circle id="score-arc" cx="32" cy="32" r="26" stroke="#a78bfa" stroke-width="5" fill="none"
              stroke-dasharray="163.36" stroke-dashoffset="163.36" stroke-linecap="round"/>
          </svg>
          <div class="score-number" id="score-display">0</div>
        </div>
        <div class="score-label">today</div>
      </div>
    </header>

    <div class="streak-row">
      <div class="streak-icon">🔥</div>
      <div class="streak-text">
        <strong id="streak-count">0</strong>
        <p id="streak-label">Start your streak today</p>
      </div>
      <button class="reset-day-btn" id="reset-day-btn">↺ reset</button>
    </div>

    <div id="notif-banner-wrap"></div>

    <div class="section-head">
      <span class="section-title">✅ Good habits</span>
      <button class="add-btn" onclick="openAddModal('positive')">＋</button>
    </div>
    <div id="positive-list"></div>

    <div class="section-head">
      <span class="section-title">⚠️ Break these</span>
      <button class="add-btn" onclick="openAddModal('negative')">＋</button>
    </div>
    <div id="negative-list"></div>
  </div>

  <!-- STATS -->
  <div class="panel" id="panel-stats">
    <header>
      <div>
        <div class="wordmark">progress<span>.</span></div>
        <div class="date-label">your journey</div>
      </div>
    </header>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="section-head">
      <span class="section-title">📅 Last 7 days</span>
    </div>
    <div id="history-list"></div>
  </div>

</div>

<!-- Bottom nav (2 tabs now) -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('today', this)">
    <span class="icon">✦</span>Today
  </button>
  <button class="nav-btn" onclick="switchTab('stats', this)">
    <span class="icon">📊</span>Progress
  </button>
</nav>

<!-- Habit Modal -->
<div class="modal-overlay" id="habit-modal">
  <div class="modal">
    <h2 id="modal-title">New habit</h2>

    <div class="field">
      <label>Type</label>
      <div class="type-toggle">
        <button class="type-btn pos selected" id="type-pos" onclick="setType('positive')">✅ Good habit</button>
        <button class="type-btn neg" id="type-neg" onclick="setType('negative')">⚠️ Break it</button>
      </div>
    </div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="habit-name-input" placeholder="e.g. Morning run" maxlength="40">
    </div>
    <div class="field">
      <label>Points (1–20)</label>
      <input type="number" id="habit-pts-input" value="5" min="1" max="20">
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <!-- Per-habit reminder -->
    <div class="reminder-section">
      <div class="reminder-section-head">
        <span class="reminder-section-title">🔔 Reminder</span>
        <button class="reminder-toggle" id="reminder-toggle-btn" onclick="toggleReminderSection()"></button>
      </div>
      <div class="reminder-options" id="reminder-options">
        <div class="reminder-row">
          <div class="field">
            <label>Schedule</label>
            <select id="r-schedule" onchange="onScheduleChange()">
              <option value="once">Once a day</option>
              <option value="hourly">Hourly between hours</option>
              <option value="weekdays">Weekdays only</option>
              <option value="weekends">Weekends only</option>
            </select>
          </div>
          <div class="field">
            <label>Time</label>
            <input type="time" id="r-time" value="08:00">
          </div>
        </div>
        <div class="hourly-row" id="hourly-row">
          <div class="field">
            <label>From</label>
            <input type="time" id="r-from" value="08:00">
          </div>
          <div class="field">
            <label>To</label>
            <input type="time" id="r-to" value="20:00">
          </div>
        </div>
        <p class="notif-hint" id="r-hint">You'll get one nudge per day at this time.</p>
      </div>
    </div>

    <div class="modal-actions" id="habit-modal-actions">
      <button class="btn-secondary" onclick="closeModal('habit-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveHabit()">Save habit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ['🏃','💪','🥗','💧','📚','🧘','😴','🚴','🎯','✍️','🎨','🌿',
  '🍎','☕','🧠','💊','🚶','🏊','🎸','🌅','🧹','💰','🛁','📱','🍷','🍔','🎮','📺'];

// ─── State ────────────────────────────────────────────────────────────────────
let state = loadState();

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('streak_v3') || '{}');
    return {
      habits: s.habits || [],
      log: s.log || {},
      streak: s.streak || 0,
      lastActive: s.lastActive || null
    };
  } catch { return { habits: [], log: {}, streak: 0, lastActive: null }; }
}

function save() { localStorage.setItem('streak_v3', JSON.stringify(state)); }
const todayKey = () => new Date().toISOString().slice(0,10);
const todayLog = () => state.log[todayKey()] || {};

// ─── Streak ───────────────────────────────────────────────────────────────────
function updateStreak() {
  const today = todayKey();
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  const positives = state.habits.filter(h => h.type === 'positive');
  if (!positives.length) return;
  const log = todayLog();
  const allDone = positives.every(h => (log[h.id] || 0) > 0);
  if (allDone) {
    if (state.lastActive === yesterday) state.streak++;
    else if (state.lastActive !== today) state.streak = 1;
    state.lastActive = today;
  }
}

function calcScore(dateKey) {
  const log = state.log[dateKey] || {};
  return state.habits.reduce((acc, h) => {
    const count = log[h.id] || 0;
    return acc + count * (h.type === 'positive' ? h.pts : -h.pts);
  }, 0);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() { renderToday(); renderStats(); }

function renderToday() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long' });

  const score = calcScore(todayKey());
  document.getElementById('score-display').textContent = score > 0 ? '+'+score : score;

  const pct = Math.min(Math.max(score, 0), 50) / 50;
  const arc = document.getElementById('score-arc');
  arc.style.strokeDashoffset = 163.36 - pct * 163.36;
  arc.style.stroke = score < 0 ? '#f87171' : score === 0 ? '#6b6b80' : '#a78bfa';

  document.getElementById('streak-count').textContent = state.streak;
  document.getElementById('streak-label').textContent =
    state.streak === 0 ? 'Start your streak today' :
    state.streak === 1 ? 'day streak — keep it going!' : 'day streak — incredible!';

  renderHabitList('positive');
  renderHabitList('negative');
  renderNotifBanner();
}

function renderHabitList(type) {
  const el = document.getElementById(type === 'positive' ? 'positive-list' : 'negative-list');
  const habits = state.habits.filter(h => h.type === type);
  if (!habits.length) { el.innerHTML = `<div class="empty">Tap + to add a habit</div>`; return; }
  const log = todayLog();
  el.innerHTML = habits.map(h => {
    const count = log[h.id] || 0;
    const pts = h.type === 'positive' ? h.pts : -h.pts;
    const total = count * pts;
    const totalStr = total > 0 ? `+${total}` : `${total}`;
    const hasReminder = h.reminder?.on;
    const bellStr = hasReminder ? ' · 🔔' : '';
    const metaStr = count === 0 ? `hold to edit${bellStr}` : `×${count} = ${totalStr} pts · hold to edit${bellStr}`;
    const valClass = count === 0 ? 'zero' : (type === 'positive' ? 'pos' : 'neg');
    return `<div class="habit-card ${type}"
      oncontextmenu="openEditModal('${h.id}'); return false;"
      ontouchstart="startLongPress('${h.id}')"
      ontouchend="cancelLongPress()"
      ontouchmove="cancelLongPress()">
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-meta">${metaStr}</div>
      </div>
      <div class="habit-counter">
        <button class="counter-btn minus" onclick="adjustHabit('${h.id}', -1)" ${count === 0 ? 'disabled' : ''}>−</button>
        <div class="counter-val ${valClass}">${count === 0 ? '·' : count}</div>
        <button class="counter-btn plus" onclick="adjustHabit('${h.id}', 1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const days = [];
  let totalPos = 0, bestScore = 0;
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const key = d.toISOString().slice(0,10);
    const s = calcScore(key);
    const label = i === 0 ? 'Today' : d.toLocaleDateString('en-AU',{weekday:'short'});
    days.push({ label, score: s });
    if (s > 0) totalPos += s;
    if (s > bestScore) bestScore = s;
  }
  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-value gold">${state.streak}</div><div class="stat-name">Day streak</div></div>
    <div class="stat-card"><div class="stat-value green">+${totalPos}</div><div class="stat-name">Points gained (7d)</div></div>
    <div class="stat-card"><div class="stat-value purple">${bestScore || 0}</div><div class="stat-name">Best day score</div></div>
    <div class="stat-card"><div class="stat-value">${state.habits.length}</div><div class="stat-name">Habits tracked</div></div>
  `;
  const maxScore = Math.max(...days.map(d => d.score), 1);
  document.getElementById('history-list').innerHTML = days.map(d => {
    const pct = d.score <= 0 ? 0 : Math.round((d.score / maxScore) * 100);
    const col = d.score < 0 ? '#f87171' : d.score === 0 ? '#6b6b80' : '#a78bfa';
    return `<div class="history-row">
      <div class="history-date">${d.label}</div>
      <div class="history-bar-wrap"><div class="history-bar" style="width:${pct}%;background:${col}"></div></div>
      <div class="history-score" style="color:${col}">${d.score > 0 ? '+' : ''}${d.score}</div>
    </div>`;
  }).join('');
}

// ─── Adjust habit ─────────────────────────────────────────────────────────────
function adjustHabit(id, delta) {
  const key = todayKey();
  if (!state.log[key]) state.log[key] = {};
  const h = state.habits.find(x => x.id === id);
  if (!h) return;
  const prev = state.log[key][id] || 0;
  const next = Math.max(0, prev + delta);
  if (next === prev) return;
  state.log[key][id] = next;
  const pts = h.type === 'positive' ? h.pts : -h.pts;
  const change = delta * pts;
  showToast(delta > 0 ? `${h.icon} ${change > 0 ? '+' : ''}${change} pts` : `${h.icon} removed one`);
  updateStreak();
  save();
  render();
}

// ─── Long press ───────────────────────────────────────────────────────────────
let lpTimer = null;
function startLongPress(id) { lpTimer = setTimeout(() => { lpTimer = null; openEditModal(id); }, 600); }
function cancelLongPress() { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }

// ─── Tab ──────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'stats') renderStats();
}

// ─── Habit modal ──────────────────────────────────────────────────────────────
let editingHabitId = null, selectedType = 'positive', selectedEmoji = '🏃';
let reminderOn = false;

function openAddModal(type) {
  editingHabitId = null;
  document.getElementById('modal-title').textContent = 'New habit';
  document.getElementById('habit-name-input').value = '';
  document.getElementById('habit-pts-input').value = 5;
  document.getElementById('habit-modal-actions').innerHTML = `
    <button class="btn-secondary" onclick="closeModal('habit-modal')">Cancel</button>
    <button class="btn-primary" onclick="saveHabit()">Save habit</button>`;
  setType(type || 'positive');
  selectedEmoji = EMOJIS[0];
  renderEmojiGrid();
  setReminderUI(false, { schedule: 'once', time: '08:00', from: '08:00', to: '20:00' });
  openModal('habit-modal');
}

function openEditModal(id) {
  const h = state.habits.find(x => x.id === id);
  if (!h) return;
  editingHabitId = id;
  document.getElementById('modal-title').textContent = 'Edit habit';
  document.getElementById('habit-name-input').value = h.name;
  document.getElementById('habit-pts-input').value = h.pts;
  setType(h.type);
  selectedEmoji = h.icon;
  document.getElementById('habit-modal-actions').innerHTML = `
    <button class="btn-danger" onclick="deleteHabit('${id}')">Delete</button>
    <button class="btn-primary" onclick="saveHabit()">Save</button>`;
  renderEmojiGrid();
  const r = h.reminder || {};
  setReminderUI(r.on || false, { schedule: r.schedule || 'once', time: r.time || '08:00', from: r.from || '08:00', to: r.to || '20:00' });
  openModal('habit-modal');
}

function setReminderUI(on, opts) {
  reminderOn = on;
  const btn = document.getElementById('reminder-toggle-btn');
  const optEl = document.getElementById('reminder-options');
  btn.classList.toggle('on', on);
  optEl.classList.toggle('visible', on);
  document.getElementById('r-schedule').value = opts.schedule;
  document.getElementById('r-time').value = opts.time;
  document.getElementById('r-from').value = opts.from;
  document.getElementById('r-to').value = opts.to;
  onScheduleChange();
}

function toggleReminderSection() {
  reminderOn = !reminderOn;
  const btn = document.getElementById('reminder-toggle-btn');
  const optEl = document.getElementById('reminder-options');
  btn.classList.toggle('on', reminderOn);
  optEl.classList.toggle('visible', reminderOn);
  if (reminderOn && Notification.permission === 'default') requestNotifPermission();
}

function onScheduleChange() {
  const sched = document.getElementById('r-schedule').value;
  const isHourly = sched === 'hourly';
  document.getElementById('hourly-row').classList.toggle('visible', isHourly);
  document.getElementById('r-time').parentElement.parentElement.style.display = isHourly ? 'none' : '';

  const hints = {
    once: "You'll get one nudge per day at this time.",
    weekdays: "You'll get one nudge on weekdays at this time.",
    weekends: "You'll get one nudge on weekends at this time.",
    hourly: "You'll get a nudge every hour between these times."
  };
  document.getElementById('r-hint').textContent = hints[sched] || '';
}

function setType(t) {
  selectedType = t;
  document.getElementById('type-pos').classList.toggle('selected', t === 'positive');
  document.getElementById('type-neg').classList.toggle('selected', t === 'negative');
}

function renderEmojiGrid() {
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</div>`
  ).join('');
}
function selectEmoji(e) { selectedEmoji = e; renderEmojiGrid(); }

function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  const pts = Math.min(20, Math.max(1, parseInt(document.getElementById('habit-pts-input').value) || 5));
  if (!name) { showToast('Give the habit a name'); return; }

  const reminder = {
    on: reminderOn,
    schedule: document.getElementById('r-schedule').value,
    time: document.getElementById('r-time').value,
    from: document.getElementById('r-from').value,
    to: document.getElementById('r-to').value,
  };

  if (editingHabitId) {
    const h = state.habits.find(x => x.id === editingHabitId);
    if (h) { h.name = name; h.pts = pts; h.type = selectedType; h.icon = selectedEmoji; h.reminder = reminder; }
  } else {
    state.habits.push({ id: 'h' + Date.now(), name, pts, type: selectedType, icon: selectedEmoji, reminder });
  }
  save();
  pushRemindersToSW();
  closeModal('habit-modal');
  render();
  showToast(editingHabitId ? 'Habit updated' : '✅ Habit added');
}

function deleteHabit(id) {
  if (!confirm('Delete this habit?')) return;
  state.habits = state.habits.filter(h => h.id !== id);
  save();
  pushRemindersToSW();
  closeModal('habit-modal');
  render();
  showToast('Habit deleted');
}

// ─── Build flat reminder list from habits ─────────────────────────────────────
// Each reminder entry: { id, label, icon, time, days }
// For hourly we expand into one entry per hour
function buildReminders() {
  const list = [];
  for (const h of state.habits) {
    const r = h.reminder;
    if (!r?.on) continue;
    const base = { habitId: h.id, label: h.name, icon: h.icon };
    if (r.schedule === 'hourly') {
      const [fh] = r.from.split(':').map(Number);
      const [th] = r.to.split(':').map(Number);
      for (let hr = fh; hr <= th; hr++) {
        list.push({ ...base, id: `${h.id}_${hr}`, time: `${String(hr).padStart(2,'0')}:00`, days: 'daily' });
      }
    } else {
      const days = r.schedule === 'weekdays' ? 'weekdays' : r.schedule === 'weekends' ? 'weekends' : 'daily';
      list.push({ ...base, id: `${h.id}_once`, time: r.time, days });
    }
  }
  return list;
}

// ─── Service Worker ───────────────────────────────────────────────────────────
let swReg = null;

async function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
    const sw = swReg.installing || swReg.waiting || swReg.active;
    if (sw && sw.state !== 'activated') {
      await new Promise(res => sw.addEventListener('statechange', e => {
        if (e.target.state === 'activated') res();
      }));
    }
    swReg = await navigator.serviceWorker.getRegistration('./');
    pushRemindersToSW();
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'GET_REMINDERS') pushRemindersToSW();
    });
    setInterval(pushHeartbeat, 60 * 1000);
    if ('periodicSync' in swReg) {
      try { await swReg.periodicSync.register('habit-check', { minInterval: 60 * 1000 }); } catch {}
    }
  } catch (e) { console.warn('SW failed:', e); }
}

function getActiveSW() { return swReg?.active || navigator.serviceWorker?.controller; }

function pushRemindersToSW() {
  const sw = getActiveSW();
  if (!sw) return;
  sw.postMessage({ type: 'SCHEDULE', reminders: buildReminders() });
}

function pushHeartbeat() {
  const sw = getActiveSW();
  if (sw) sw.postMessage({ type: 'HEARTBEAT' });
}

// ─── Notifications ────────────────────────────────────────────────────────────
function renderNotifBanner() {
  const el = document.getElementById('notif-banner-wrap');
  if (!('Notification' in window) || Notification.permission === 'granted') { el.innerHTML = ''; return; }
  if (Notification.permission === 'denied') {
    el.innerHTML = `<div class="notif-banner"><p>🔕 Notifications blocked. Enable in your device settings.</p></div>`; return;
  }
  el.innerHTML = `<div class="notif-banner"><p>Enable notifications to use habit reminders.</p><button onclick="requestNotifPermission()">Enable</button></div>`;
}

async function requestNotifPermission() {
  const perm = await Notification.requestPermission();
  renderNotifBanner();
  if (perm === 'granted') { showToast('🔔 Notifications enabled'); pushRemindersToSW(); }
}

// ─── Reset ────────────────────────────────────────────────────────────────────
document.getElementById('reset-day-btn').addEventListener('click', () => {
  if (!confirm("Reset all of today's logs?")) return;
  delete state.log[todayKey()];
  save(); render(); showToast('Today reset');
});

// ─── Modal helpers ────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  setTimeout(() => document.querySelector(`#${id} input`)?.focus(), 100);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Seed ────────────────────────────────────────────────────────────────────
function seedIfEmpty() {
  if (state.habits.length) return;
  // Migrate from old key if present
  try {
    const old = JSON.parse(localStorage.getItem('streak_v2') || '{}');
    if (old.habits?.length) { state.habits = old.habits; state.log = old.log || {}; state.streak = old.streak || 0; state.lastActive = old.lastActive || null; save(); return; }
  } catch {}
  state.habits = [
    { id: 'h1', name: 'Morning exercise', pts: 10, type: 'positive', icon: '🏃', reminder: { on: false } },
    { id: 'h2', name: 'Drink 8 glasses of water', pts: 5, type: 'positive', icon: '💧', reminder: { on: false } },
    { id: 'h3', name: 'Read for 20 minutes', pts: 5, type: 'positive', icon: '📚', reminder: { on: false } },
    { id: 'h4', name: 'Skipped junk food', pts: 8, type: 'positive', icon: '🥗', reminder: { on: false } },
    { id: 'h5', name: 'Too much screen time', pts: 5, type: 'negative', icon: '📱', reminder: { on: false } },
  ];
  save();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
seedIfEmpty();
updateStreak();
render();
registerSW();
</script>
